# openspec/config.yaml
schema: spec-driven

context: |
  Name: CrmErp — modular ERP/CRM for small/medium businesses
  Stack: Turborepo + pnpm monorepo, React + Vite + React Router 7 (frontend),
         Fastify + TypeBox + TypeScript (backend), PostgreSQL + Prisma (database)
  Architecture: Multi-tenant (shared DB, tenant_id on all tables),
                domain-driven modules, event-bus integration pattern
  Testing: NOT YET CONFIGURED — greenfield project
  Persistence: OpenSpec files

rules:
  proposal:
    - Include rollback plan for risky changes
    - Define tenant isolation impact for each change
    - Specify domain boundaries affected
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Tag each requirement with affected domain
  design:
    - Include sequence diagrams for multi-tenant flows
    - Document architecture decisions with rationale
    - Specify event bus contracts (event name, payload, producers, consumers)
    - Define tenant_id propagation strategy
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
    - Separate backend API, frontend UI, and DB migration tasks
  apply:
    - Follow Turborepo workspace conventions
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
    - Archive by YYYY-MM-DD-{change-name}

testing:
  strict_tdd: false
  status: not_available
  reason: |
    No test runner or test configuration detected. The project is greenfield —
    no package.json, test framework, or CI configuration exists yet.
    Strict TDD is disabled until a test runner is configured.
  detected: 2026-06-30
  test_runner:
    command: N/A
    framework: none
  layers:
    unit: { available: false, tool: "--" }
    integration: { available: false, tool: "--" }
    e2e: { available: false, tool: "--" }
  coverage:
    available: false
    command: "--"
  quality:
    linter: { available: false, command: "--" }
    type_checker: { available: false, command: "--" }
    formatter: { available: false, command: "--" }
